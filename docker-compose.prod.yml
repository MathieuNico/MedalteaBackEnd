services:
  api:
    image: ${IMAGE_NAME:-ghcr.io/mathieunico/medalteabackend/api:latest}
    container_name: medaltea_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-40300}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}

networks:
  medaltea_network:
    driver: bridge
